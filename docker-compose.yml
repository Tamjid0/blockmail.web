services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: blockmail-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blockmail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: blockmail-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Blockmail Engine
  blockmail-engine:
    build:
      context: ../blockmail
      dockerfile: Dockerfile
    container_name: blockmail-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - PORT=8080
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=development-secret-key
      - ADMIN_API_KEY=admin-secret-key
      - LOOKUP_TIMEOUT_MS=5000
      - RATE_LIMIT_MAX_REQUESTS=1000
      - RATE_LIMIT_WINDOW_SECONDS=60
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
